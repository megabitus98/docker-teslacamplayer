name: Release

# Fires on either a `v*` tag push or a manually published GitHub Release.
# Both paths run the full pipeline (idempotent), so either workflow is supported.
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

# Avoid two parallel runs for the same tag.
concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write   # create / update GitHub Releases
  packages: write   # push to GHCR

jobs:
  # --------------------------------------------------------------------------
  # Resolve the version once and share it with every downstream job.
  # --------------------------------------------------------------------------
  meta:
    name: Resolve metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      assembly_version: ${{ steps.v.outputs.assembly_version }}
      tag: ${{ steps.v.outputs.tag }}
      build_date: ${{ steps.v.outputs.build_date }}
      is_prerelease: ${{ steps.v.outputs.is_prerelease }}
      ghcr_owner: ${{ steps.v.outputs.ghcr_owner }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          # AssemblyVersion must be numeric (major.minor.build.revision), so strip any
          # prerelease suffix (e.g. "1.2.3-rc1" -> "1.2.3").
          ASM_VERSION="${VERSION%%-*}"
          # Pre-release if the version contains a hyphen (e.g. 1.2.3-rc1)
          if echo "$VERSION" | grep -q '-'; then
            IS_PRE=true
          else
            IS_PRE=false
          fi
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "assembly_version=$ASM_VERSION"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "is_prerelease=$IS_PRE"
            echo "ghcr_owner=$OWNER_LC"
          } >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # Per-arch Docker builds. Each arch is pushed under `:VERSION-<arch>`; the
  # multi-arch manifest job below stitches them into a single `:VERSION` tag.
  # --------------------------------------------------------------------------
  docker:
    name: Docker (${{ matrix.arch }})
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            dockerfile: Dockerfile
          - arch: arm64
            platform: linux/arm64
            dockerfile: Dockerfile.aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            TESLACAMPLAYER_VERSION=${{ needs.meta.outputs.assembly_version }}
            BUILD_DATE=${{ needs.meta.outputs.build_date }}
          tags: |
            docker.io/megabitus/teslacamplayer:${{ needs.meta.outputs.version }}-${{ matrix.arch }}
            ghcr.io/${{ needs.meta.outputs.ghcr_owner }}/teslacamplayer:${{ needs.meta.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  # --------------------------------------------------------------------------
  # Combine the per-arch images into a single multi-arch manifest so that
  # `docker pull megabitus/teslacamplayer:VERSION` resolves correctly on both
  # amd64 and arm64. Also tag `:latest` for stable (non-prerelease) versions.
  # --------------------------------------------------------------------------
  docker-manifest:
    name: Docker multi-arch manifest
    needs: [meta, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          IS_PRE: ${{ needs.meta.outputs.is_prerelease }}
          OWNER: ${{ needs.meta.outputs.ghcr_owner }}
        run: |
          set -e
          for repo in \
            "docker.io/megabitus/teslacamplayer" \
            "ghcr.io/${OWNER}/teslacamplayer"; do

            TAGS=("${VERSION}")
            if [ "${IS_PRE}" = "false" ]; then
              TAGS+=("latest")
            fi

            for tag in "${TAGS[@]}"; do
              echo "Creating manifest ${repo}:${tag}"
              docker manifest create "${repo}:${tag}" \
                "${repo}:${VERSION}-amd64" \
                "${repo}:${VERSION}-arm64"
              docker manifest push "${repo}:${tag}"
            done
          done

  # --------------------------------------------------------------------------
  # Self-contained binary builds for end users that don't want Docker.
  # All five RIDs build in parallel.
  # --------------------------------------------------------------------------
  binaries:
    name: Binary (${{ matrix.label }})
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            label: Linux-x64
            ext: tar.gz
            define: LINUX
          - os: ubuntu-latest
            rid: linux-arm64
            label: Linux-arm64
            ext: tar.gz
            define: LINUX
          - os: windows-latest
            rid: win-x64
            label: Windows-x64
            ext: zip
            define: WINDOWS
          - os: macos-latest
            rid: osx-x64
            label: macOS-x64
            ext: tar.gz
            define: LINUX   # csproj has no OSX branch; LINUX path uses `ffprobe` in PATH, which works on macOS.
          - os: macos-latest
            rid: osx-arm64
            label: macOS-arm64
            ext: tar.gz
            define: LINUX
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TeslaCamPlayer/src/TeslaCamPlayer.BlazorHosted/Client/package-lock.json

      - name: Build client assets
        working-directory: TeslaCamPlayer/src/TeslaCamPlayer.BlazorHosted/Client
        run: |
          npm ci
          npx gulp default

      - name: Restore .NET workloads
        # Server transitively references the Blazor WASM Client project, which needs
        # the wasm-tools workload. setup-dotnet installs only the bare SDK.
        run: |
          dotnet workload restore TeslaCamPlayer/src/TeslaCamPlayer.BlazorHosted/Server/TeslaCamPlayer.BlazorHosted.Server.csproj

      - name: Publish server (self-contained)
        shell: bash
        env:
          # Git Bash on Windows otherwise rewrites /p:... arguments into Windows paths.
          MSYS_NO_PATHCONV: '1'
          MSYS2_ARG_CONV_EXCL: '*'
        run: |
          dotnet publish TeslaCamPlayer/src/TeslaCamPlayer.BlazorHosted/Server/TeslaCamPlayer.BlazorHosted.Server.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            /p:EnableCompressionInSingleFile=true \
            /p:DebugType=none \
            /p:DefineConstants="TRACE%3B${{ matrix.define }}" \
            /p:AssemblyVersion=${{ needs.meta.outputs.assembly_version }} \
            -o dist/${{ matrix.rid }}

      - name: Stage extras (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp LICENSE "dist/${{ matrix.rid }}/" || true
          if [ -f DISTRIBUTION-README.md ]; then
            cp DISTRIBUTION-README.md "dist/${{ matrix.rid }}/README.md"
          fi
          cat > "dist/${{ matrix.rid }}/appsettings.json" <<'EOF'
          {
            "Logging": {
              "LogLevel": {
                "Default": "Information",
                "Microsoft.AspNetCore": "Warning"
              }
            },
            "AllowedHosts": "*",
            "ClipsRootPath": "/mnt/teslacam",
            "IndexingBatchSize": 1000,
            "IndexingMinBatchSize": 250,
            "IndexingMaxMemoryUtilization": 0.85,
            "IndexingMemoryRecoveryDelaySeconds": 5
          }
          EOF
          cat > "dist/${{ matrix.rid }}/run.sh" <<'EOF'
          #!/usr/bin/env bash
          echo "Starting TeslaCam Player on http://localhost:5000"
          exec ./TeslaCamPlayer.BlazorHosted.Server
          EOF
          chmod +x "dist/${{ matrix.rid }}/run.sh"
          chmod +x "dist/${{ matrix.rid }}/TeslaCamPlayer.BlazorHosted.Server" || true

      - name: Stage extras (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "dist/${{ matrix.rid }}"
          Copy-Item LICENSE -Destination $out -Force -ErrorAction SilentlyContinue
          if (Test-Path "DISTRIBUTION-README.md") {
            Copy-Item "DISTRIBUTION-README.md" -Destination (Join-Path $out "README.txt") -Force
          }
          @'
          {
            "Logging": { "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" } },
            "AllowedHosts": "*",
            "ClipsRootPath": "C:\\TeslaCam",
            "IndexingBatchSize": 1000,
            "IndexingMinBatchSize": 250,
            "IndexingMaxMemoryUtilization": 0.85,
            "IndexingMemoryRecoveryDelaySeconds": 5
          }
          '@ | Out-File -FilePath (Join-Path $out "appsettings.json") -Encoding UTF8 -Force
          @'
          @echo off
          echo Starting TeslaCam Player on http://localhost:5000
          TeslaCamPlayer.BlazorHosted.Server.exe
          '@ | Out-File -FilePath (Join-Path $out "run.bat") -Encoding ASCII -Force

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/artifacts
          NAME="TeslaCamPlayer-${{ needs.meta.outputs.version }}-${{ matrix.label }}"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            (cd "dist/${{ matrix.rid }}" && 7z a -tzip "../artifacts/${NAME}.zip" . >/dev/null)
          else
            tar -czf "dist/artifacts/${NAME}.tar.gz" -C "dist/${{ matrix.rid }}" .
          fi
          ls -la dist/artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.label }}
          path: dist/artifacts/*
          if-no-files-found: error
          retention-days: 14

  # --------------------------------------------------------------------------
  # Aggregate every binary into a single GitHub Release. softprops/action
  # creates the release if it doesn't exist yet (tag-push path) or updates
  # the existing one (release-publish path).
  # --------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [meta, binaries, docker-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bin-*
          merge-multiple: true

      - name: List collected artifacts
        run: ls -la artifacts/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.is_prerelease }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ### Docker images

            Multi-arch (`linux/amd64`, `linux/arm64`):

            - `docker.io/megabitus/teslacamplayer:${{ needs.meta.outputs.version }}`
            - `ghcr.io/${{ needs.meta.outputs.ghcr_owner }}/teslacamplayer:${{ needs.meta.outputs.version }}`

            ### Self-contained binaries

            Each archive bundles the .NET runtime; no separate install is required. You still need `ffmpeg` / `ffprobe` on `PATH` (and `python3` + `Pillow` if you use the HUD renderer).
