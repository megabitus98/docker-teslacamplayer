---
services:
  teslacamplayer:
    # image: megabitus/teslacamplayer:1.0.7
    build:
      context: .
      dockerfile: Dockerfile.aarch64
    container_name: teslacamplayer
    environment:
      - TZ=Europe/Bucharest
      - ENABLE_DELETE=false # Enable delete functionality in the web UI
      - SPEED_UNIT=kmh # Speed unit for SEI HUD telemetry (kmh or mph)
      - EXPORT_ROOT_PATH=/export
      - EXPORT_RETENTION_HOURS=0
      # Decrypt encrypted TeslaCam clips (firmware 2026.20+). Obtain a refresh token once with the
      # tesla-dashcam-decrypt tool and put it in a local .env (see .env.example). Optional.
      - TESLA_REFRESH_TOKEN=${TESLA_REFRESH_TOKEN:-}
      - DECRYPTED_CACHE_PATH=/config/decrypted
      - DECRYPTED_CACHE_MAX_GB=10
    volumes:
      - appdata:/config
      - /Users/megabitus/Movies/TeslaCam:/media
      # - /Volumes/TeslaCam/TeslaCam:/media
      - exportdata:/export
    ports:
      - 5500:5000
    restart: unless-stopped

volumes:
  appdata:
    driver: local
  exportdata:
    driver: local
